services:
  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: neuroclassifier
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: neuroclassifier
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuroclassifier -d neuroclassifier"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis (broker + result backend)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nc_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nc_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "29000:9000"   # S3 API
      - "29001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # MinIO bucket initializer (one-shot)
  minio_init:
    image: minio/mc:latest
    container_name: nc_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/datasets &&
        mc mb --ignore-existing local/models &&
        mc anonymous set download local/datasets &&
        echo 'Buckets ready.'
      "

  # ──────────────────────────────────────────────
  # API application
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nc_app
    restart: unless-stopped
    user: "0:0"
    environment:
      DATABASE_URL: postgresql+asyncpg://neuroclassifier:secret@postgres:5432/neuroclassifier
      DATABASE_URL_SYNC: postgresql+psycopg2://neuroclassifier:secret@postgres:5432/neuroclassifier
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: localhost:29000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
    ports:
      - "18015:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - nc_shared_tmp:/tmp/neuroclassifier
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # Celery worker
  # ──────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: nc_celery_worker
    restart: unless-stopped
    user: "0:0"
    environment:
      DATABASE_URL: postgresql+asyncpg://neuroclassifier:secret@postgres:5432/neuroclassifier
      DATABASE_URL_SYNC: postgresql+psycopg2://neuroclassifier:secret@postgres:5432/neuroclassifier
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
    # command is defined in Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - nc_shared_tmp:/tmp/neuroclassifier
    healthcheck:
      disable: true

  # ──────────────────────────────────────────────
  # Celery Flower (task monitoring UI)
  # ──────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nc_flower
    restart: unless-stopped
    command: >
      celery -A app.workers.train_worker.celery_app flower
      --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "15555:5555"
    depends_on:
      - redis
    healthcheck:
      disable: true

  # ──────────────────────────────────────────────
  # Prometheus
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: nc_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "19090:9090"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Grafana
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: nc_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  nc_shared_tmp:
  prometheus_data:
  grafana_data:
